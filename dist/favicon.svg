<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="1200" rx="80" fill="#FFFFFF"/>

  <!-- Brand Colors -->
  <defs>
    <linearGradient id="blueGrad" x1="300" y1="160" x2="900" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#0B2C6F"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="340" y1="520" x2="900" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FDBA11"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#1E3A8A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Logo Icon Group -->
  <g filter="url(#softShadow)">
    <!-- Umbrella top -->
    <path d="M305 390C350 245 463 175 600 175C737 175 850 245 895 390C845 350 782 345 725 390C679 350 648 325 600 325C552 325 521 350 475 390C418 345 355 350 305 390Z" fill="url(#blueGrad)"/>
    <path d="M600 175V665" stroke="#1E3A8A" stroke-width="22" stroke-linecap="round"/>
    <path d="M600 175C545 230 505 300 475 390" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
    <path d="M600 175C655 230 695 300 725 390" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
    <path d="M600 150V175" stroke="#1E3A8A" stroke-width="20" stroke-linecap="round"/>
    <path d="M600 665C600 720 545 720 545 675" stroke="#1E3A8A" stroke-width="24" stroke-linecap="round"/>

    <!-- Growth bars -->
    <rect x="485" y="530" width="58" height="120" rx="8" fill="#1E3A8A"/>
    <rect x="575" y="490" width="58" height="160" rx="8" fill="#1E3A8A"/>
    <rect x="665" y="445" width="58" height="205" rx="8" fill="#1E3A8A"/>

    <!-- Amber growth swoosh / human -->
    <path d="M372 615C500 720 721 685 845 495C818 642 663 765 455 712C410 700 379 675 345 640C337 632 344 610 372 615Z" fill="url(#amberGrad)"/>
    <circle cx="785" cy="455" r="36" fill="#F59E0B"/>
    <path d="M745 480C775 525 825 530 850 470" stroke="#F59E0B" stroke-width="30" stroke-linecap="round"/>
  </g>

  <!-- Brand Text -->
  <text x="600" y="845" text-anchor="middle"
        font-family="Manrope, Arial, sans-serif"
        font-size="112" font-weight="600" letter-spacing="8" fill="#1E3A8A">
    UMBRELLA
  </text>

  <text x="600" y="935" text-anchor="middle"
        font-family="Manrope, Arial, sans-serif"
        font-size="64" font-weight="600" letter-spacing="18" fill="#F59E0B">
    FINANCE
  </text>

  <!-- Divider Lines -->
  <line x1="170" y1="920" x2="280" y2="920" stroke="#1E3A8A" stroke-width="8" stroke-linecap="round"/>
  <line x1="920" y1="920" x2="1030" y2="920" stroke="#1E3A8A" stroke-width="8" stroke-linecap="round"/>
  <line x1="295" y1="1008" x2="355" y2="1008" stroke="#F59E0B" stroke-width="6" stroke-linecap="round"/>
  <line x1="845" y1="1008" x2="905" y2="1008" stroke="#F59E0B" stroke-width="6" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="600" y="1030" text-anchor="middle"
        font-family="Manrope, Noto Sans Devanagari, Arial, sans-serif"
        font-size="46" font-weight="600" fill="#1E3A8A">
    छोटे कदम, बड़े सपने
  </text>
</svg>
